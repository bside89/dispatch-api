services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8'
    ports:
      - '${DB_PORT}:${DB_PORT}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - dispatch-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    env_file:
      - .env.docker
    ports:
      - '${REDIS_PORT}:${REDIS_PORT}'
    volumes:
      - redis_data:/data
    networks:
      - dispatch-network

  promtail:
    image: grafana/promtail:3.6.8
    container_name: grafana-promtail
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - dispatch-network

  loki:
    image: grafana/loki:2.9.0
    container_name: grafana-loki
    ports:
      - '3100:3100'
    volumes:
      - loki_data:/loki
    networks:
      - dispatch-network

  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - dispatch-network

  stripe-mock:
    image: stripe/stripe-mock:v0.197.0
    container_name: stripe-mock
    ports:
      - '12111:12111'
    networks:
      - dispatch-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dispatch-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '${APP_PORT}:${APP_PORT}'
    env_file:
      - .env.docker
    volumes:
      - ./logs:/app/logs
      - ./.env.docker:/app/.env:ro
    networks:
      - dispatch-network
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:${APP_PORT}/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:

networks:
  dispatch-network:
    driver: bridge
