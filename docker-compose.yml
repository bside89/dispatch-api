version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: order_processing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - order-processing-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - order-processing-network

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    environment:
    - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - order-processing-network

  loki:
    image: grafana/loki:2.9.0
    ports:
      - '3100:3100'
    volumes:
      - loki_data:/loki
    networks:
      - order-processing-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - order-processing-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-flow-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '3000:3000'
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: order_processing
      DB_LOGGING: 'false'
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      REDIS_URL: redis://redis:6379
      
      # Application
      APP_PORT: 3000
      APP_ENV: production
      NODE_ENV: production
      
      # Cache
      CACHE_TTL: 300
      
      # Admin (Basic Auth)
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      
      # JWT Settings
      JWT_ACCESS_SECRET: 079289fa8f21332c670c70773153c5d5e7705aeff3561eb2f5123cc4c8e4aec7
      JWT_REFRESH_SECRET: f8c2e91d47ba6f023c4d7e8a1e9b2f46c3e5d9a7b8f1c4e6d8a2b5f7c9e1a3d6
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      
      # API
      API_VERSION: 1.0.0
      API_TITLE: Order Flow
      API_DESCRIPTION: API for processing orders with PostgreSQL, Redis and BullMQ. Built with NestJS.
      
      # Debug Settings
      LOG_LEVEL: info
      TYPEORM_LOGGING: 'false'
      NEST_DEBUG: 'false'
    volumes:
      - ./logs:/app/logs
    networks:
      - order-processing-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:

networks:
  order-processing-network:
    driver: bridge
